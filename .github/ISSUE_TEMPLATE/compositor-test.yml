name: Compositor test report
description: Report Keybind Cheatsheet results from Mango, Hyprland, or Niri.
title: "[Compositor test]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing. Please use a small sanitized config example when reporting a parsing failure.

  - type: dropdown
    id: compositor
    attributes:
      label: Compositor and parser
      options:
        - Hyprland classic configuration
        - Hyprland Lua configuration
        - Niri
        - Mango
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include both the Noctalia and compositor versions.
      placeholder: "Noctalia 5.x, Niri x.y"
    validations:
      required: true

  - type: dropdown
    id: detection
    attributes:
      label: Automatic detection
      options:
        - Worked
        - Failed
        - Not tested
    validations:
      required: true

  - type: textarea
    id: configuration
    attributes:
      label: Configuration layout
      description: Describe custom paths, includes, globs, or parser overrides without posting private configuration.
    validations:
      required: true

  - type: textarea
    id: results
    attributes:
      label: Results
      description: Report panel and widget toggling, parsed bindings, search, editing, persistence, refresh, and self-test behavior.
    validations:
      required: true

  - type: textarea
    id: failure
    attributes:
      label: Errors or sanitized reproducer
      description: Include the exact visible error, relevant Noctalia log lines, and a minimal sanitized config when applicable.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private commands, paths, tokens, and personal data from this report.
          required: true
